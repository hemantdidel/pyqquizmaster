<header class="site-header">

    <!-- =========================
         HEADER TOP
    ========================== -->

    <div class="header-top">

        <div class="container header-top-container">

            <!-- Logo -->

            <a href="index.html" class="site-logo">

                <img
                    src="assets/logos/logo.png"
                    alt="PYQ Quiz Master"
                    class="logo-image"
                    width="58"
                    height="58">

                <div class="logo-content">

                    <h1 class="logo-title">
                        <span>PYQ</span> Quiz Master
                    </h1>

                    <p class="logo-tagline">
                        Previous Year Questions
                    </p>

                </div>

            </a>

            <!-- Search -->

            <form
                class="header-search"
                id="headerSearchForm"
                autocomplete="off">

                <input
                    id="headerSearchInput"
                    type="search"
                    placeholder="Search Exams, Jobs, Notes..."
                    aria-label="Search">

                <button
                    type="submit"
                    aria-label="Search">

                    🔍

                </button>

            </form>

            <!-- Right Side -->

            <div class="header-actions">

                <!-- Theme -->

                <button
                    type="button"
                    class="header-btn"
                    id="themeBtn"
                    aria-label="Toggle Theme">

                    🌙

                </button>

                <!-- Notification -->

                <button
                    type="button"
                    class="header-btn"
                    id="notificationBtn"
                    aria-label="Notifications">

                    🔔

                    <span class="notification-badge">
                        8
                    </span>

                </button>

                <!-- Login -->

                <button
                    type="button"
                    class="profile-btn"
                    id="profileBtn">

                    👤

                    <span>
                        Login
                    </span>

                </button>

                <!-- Menu -->

                <button
                    type="button"
                    class="header-btn menu-btn"
                    id="menuToggle"
                    aria-label="Open Menu">

                    ☰

                </button>

            </div>

        </div>

    </div>

</header>
